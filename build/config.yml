# This file contains the configuration for this project.
# When you update `info` or `fileAssociations`, run `wails3 task common:update:build-assets` to update the assets.
# Note that this will overwrite any changes you have made to the assets.
version: '3'

# This information is used to generate the build assets.
info:
  companyName: "MQTT Viewer"
  productName: "MQTT Viewer"
  productIdentifier: "com.mqttviewer.MQTTViewer"
  description: "A fast and feature-rich MQTT visualization and debugging tool"
  copyright: "Copyright © 2026 MQTT Viewer"
  comments: "A fast and feature-rich MQTT visualization and debugging tool"
  version: "0.0.0"

# Dev mode configuration
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
      - _dev_resources
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - "*_test.go"
      - "*.db"
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    # dev-run.sh gates the app launch on the Vite dev server being up (so the
    # webview never races the bind and stays blank), then launches the app. It
    # has to be a single wrapper script: wails3 splits each execute cmd into argv
    # on whitespace and does not run it through a shell, so shell operators like
    # `&&` and quotes are passed through literally and the launch would not run.
    - cmd: sh scripts/dev-run.sh
      type: primary
