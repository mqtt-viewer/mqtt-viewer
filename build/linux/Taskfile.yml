version: '3'

includes:
  common: ../Taskfile.yml

vars:
  # Docker image for cross-compilation (used when building on non-Linux or no CC available)
  CROSS_IMAGE: wails-cross

tasks:
  build:
    summary: Builds the application for Linux
    cmds:
      # Linux requires CGO - use Docker when:
      # 1. Cross-compiling from non-Linux, OR
      # 2. No C compiler is available, OR
      # 3. Target architecture differs from host architecture (cross-arch compilation)
      - task: '{{if and (eq OS "linux") (eq .HAS_CC "true") (eq .TARGET_ARCH ARCH)}}build:native{{else}}build:docker{{end}}'
        vars:
          ARCH: '{{.ARCH}}'
          DEV: '{{.DEV}}'
          OUTPUT: '{{.OUTPUT}}'
          LD_FLAGS:
            ref: .LD_FLAGS
    vars:
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
      TARGET_ARCH: '{{.ARCH | default ARCH}}'
      HAS_CC:
        sh: 'wails3 tool has-cc'

  build:native:
    summary: Builds the application natively on Linux
    internal: true
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          DEV:
            ref: .DEV
      - task: common:generate:icons
      - task: generate:dotdesktop
    cmds:
      - go build {{.BUILD_FLAGS}} -o {{.OUTPUT}}
    vars:
      # gtk3: stay on the WebKit2GTK 4.1 stack (supported through Wails v3.0.x)
      # for compatibility with Ubuntu 22.04 LTS era distros.
      BUILD_FLAGS: '{{if eq .DEV "true"}}-tags gtk3 -buildvcs=false -gcflags=all="-l" -ldflags="{{.LD_FLAGS}}"{{else}}-tags production,gtk3 -trimpath -buildvcs=false -ldflags="-w -s {{.LD_FLAGS}}"{{end}}'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
    env:
      GOOS: linux
      CGO_ENABLED: 1
      GOARCH: '{{.ARCH | default ARCH}}'

  build:docker:
    summary: Builds for Linux using Docker (for non-Linux hosts or when no C compiler available)
    internal: true
    deps:
      - task: common:build:frontend
      - task: common:generate:icons
      - task: generate:dotdesktop
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is required for cross-compilation to Linux. Please install Docker."
      - sh: docker image inspect {{.CROSS_IMAGE}} > /dev/null 2>&1
        msg: |
          Docker image '{{.CROSS_IMAGE}}' not found.
          Build it first: wails3 task setup:docker
    cmds:
      - docker run --rm -v "{{.ROOT_DIR}}:/app" {{.DOCKER_MOUNTS}} -e APP_NAME="{{.APP_NAME}}" "{{.CROSS_IMAGE}}" linux {{.DOCKER_ARCH}}
      - cmd: docker run --rm -v "{{.ROOT_DIR}}:/app" alpine chown -R $(id -u):$(id -g) /app/bin
        platforms: [linux, darwin]
      - mkdir -p {{.BIN_DIR}}
      - mv "bin/{{.APP_NAME}}-linux-{{.DOCKER_ARCH}}" "{{.OUTPUT}}"
    vars:
      DOCKER_ARCH: '{{.ARCH | default "amd64"}}'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
      DOCKER_MOUNTS:
        sh: 'wails3 tool docker-mounts'

  package:
    summary: Packages the application for Linux (AppImage, deb, rpm)
    deps:
      - task: build
        vars:
          ARCH: '{{.ARCH}}'
          LD_FLAGS:
            ref: .LD_FLAGS
    cmds:
      - task: create:appimage
      - task: create:deb
      - task: create:rpm

  create:appimage:
    summary: Creates an AppImage
    dir: build/linux/appimage
    deps:
      - task: build
        vars:
          ARCH: '{{.ARCH}}'
          LD_FLAGS:
            ref: .LD_FLAGS
      - task: generate:dotdesktop
    cmds:
      - cp "{{.APP_BINARY}}" "{{.APP_NAME}}"
      - cp ../../appicon.png "{{.APP_NAME}}.png"
      - wails3 generate appimage -binary "{{.APP_NAME}}" -icon {{.ICON}} -desktopfile {{.DESKTOP_FILE}} -outputdir {{.OUTPUT_DIR}} -builddir {{.ROOT_DIR}}/build/linux/appimage/build
    vars:
      APP_NAME: '{{.APP_NAME}}'
      APP_BINARY: '../../../bin/{{.APP_NAME}}'
      ICON: '{{.APP_NAME}}.png'
      DESKTOP_FILE: '../{{.APP_NAME}}.desktop'
      OUTPUT_DIR: '../../../bin'

  create:deb:
    summary: Creates a deb package
    deps:
      - task: build
        vars:
          ARCH: '{{.ARCH}}'
          LD_FLAGS:
            ref: .LD_FLAGS
    cmds:
      - task: generate:dotdesktop
      - wails3 tool package -name "{{.APP_NAME}}" -format deb -config ./build/linux/nfpm/nfpm.yaml -out {{.ROOT_DIR}}/bin
    env:
      NFPM_VERSION: '{{trimPrefix "v" (.VERSION | default "0.0.0")}}'
      GOARCH: '{{.ARCH | default ARCH}}'

  create:rpm:
    summary: Creates a rpm package
    deps:
      - task: build
        vars:
          ARCH: '{{.ARCH}}'
          LD_FLAGS:
            ref: .LD_FLAGS
    cmds:
      - task: generate:dotdesktop
      - wails3 tool package -name "{{.APP_NAME}}" -format rpm -config ./build/linux/nfpm/nfpm.yaml -out {{.ROOT_DIR}}/bin
    env:
      NFPM_VERSION: '{{trimPrefix "v" (.VERSION | default "0.0.0")}}'
      GOARCH: '{{.ARCH | default ARCH}}'

  create:flatpak:
    summary: Creates a Flatpak single-file bundle and a local signed repo
    # Consumes the binary produced by `build`/`package` rather than rebuilding
    # it, so the bundled binary keeps the exact production ldflags (version,
    # baked-in secrets) from the preceding package step. Run `linux:build` or
    # `linux:package` first.
    preconditions:
      - sh: test -f {{.ROOT_DIR}}/bin/{{.APP_NAME}}
        msg: "bin/{{.APP_NAME}} not found. Run `wails3 task linux:build` (or linux:package) with the production LD_FLAGS first."
    cmds:
      # Stage the prebuilt binary and assets next to the manifest.
      - rm -rf {{.STAGING}} && mkdir -p {{.STAGING}}
      - cp {{.ROOT_DIR}}/bin/{{.APP_NAME}} {{.STAGING}}/mqtt-viewer
      - cp {{.FLATPAK_DIR}}/{{.FLATPAK_ID}}.desktop {{.STAGING}}/{{.FLATPAK_ID}}.desktop
      - cp {{.FLATPAK_DIR}}/{{.FLATPAK_ID}}.yml {{.STAGING}}/{{.FLATPAK_ID}}.yml
      - cp {{.ROOT_DIR}}/build/appicon.png {{.STAGING}}/{{.FLATPAK_ID}}.png
      # Inject the release version and build date into the metainfo.
      - sed -e "s/__VERSION__/{{.CLEAN_VERSION}}/g" -e "s/__DATE__/{{.BUILD_DATE}}/g" {{.FLATPAK_DIR}}/{{.FLATPAK_ID}}.metainfo.xml > {{.STAGING}}/{{.FLATPAK_ID}}.metainfo.xml
      # Build into a local OSTree repo (signed when GPG_KEY_ID is set).
      - cd {{.STAGING}} && flatpak-builder --user --force-clean {{if .GPG_KEY_ID}}--gpg-sign={{.GPG_KEY_ID}} {{end}}--repo={{.REPO_DIR}} builddir {{.FLATPAK_ID}}.yml
      # Produce the single-file bundle used as a release asset.
      - flatpak build-bundle {{if .GPG_KEY_ID}}--gpg-sign={{.GPG_KEY_ID}} {{end}}{{.REPO_DIR}} {{.ROOT_DIR}}/bin/mqtt-viewer.flatpak {{.FLATPAK_ID}}
    vars:
      FLATPAK_ID: app.mqttviewer.MQTTViewer
      FLATPAK_DIR: '{{.ROOT_DIR}}/build/linux/flatpak'
      STAGING: '{{.ROOT_DIR}}/build/linux/flatpak/staging'
      REPO_DIR: '{{.ROOT_DIR}}/build/linux/flatpak/repo'
      CLEAN_VERSION: '{{trimPrefix "v" (.VERSION | default "0.0.0")}}'
      BUILD_DATE:
        sh: date -u +%Y-%m-%d

  generate:dotdesktop:
    summary: Generates a `.desktop` file
    dir: build
    cmds:
      - mkdir -p {{.ROOT_DIR}}/build/linux/appimage
      - wails3 generate .desktop -name "{{.PRODUCT_NAME}}" -exec "{{.EXEC}}" -icon "{{.ICON}}" -outputfile "{{.ROOT_DIR}}/build/linux/{{.APP_NAME}}.desktop" -categories "{{.CATEGORIES}}"
    vars:
      EXEC: '{{.APP_NAME}}'
      ICON: '{{.APP_NAME}}'
      CATEGORIES: 'Development;Utility;'

  run:
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}'
