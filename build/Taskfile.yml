version: '3'

tasks:
  go:mod:tidy:
    summary: Runs go mod tidy
    internal: true
    cmds:
      - go mod tidy

  install:frontend:deps:
    summary: Installs frontend dependencies with pnpm
    dir: frontend
    sources:
      - package.json
      - pnpm-lock.yaml
    generates:
      - node_modules/**/*
    preconditions:
      - sh: pnpm --version
        msg: "pnpm is required. Install it with: npm install -g pnpm"
    cmds:
      - pnpm install --frozen-lockfile

  generate:bindings:
    summary: Generates Wails v3 TypeScript bindings
    deps:
      - task: go:mod:tidy
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - frontend/bindings/**/*
    cmds:
      - wails3 generate bindings -clean=true -ts

  generate:icons:
    summary: Generates Windows `.ico` and macOS `.icns` files from the app icon
    dir: build
    sources:
      - appicon.png
    generates:
      - darwin/icons.icns
      - windows/icon.ico
    cmds:
      - wails3 generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico

  build:frontend:
    summary: Builds the frontend project
    dir: frontend
    deps:
      - task: install:frontend:deps
      - task: generate:bindings
    cmds:
      - '{{if eq .DEV "true"}}echo "Skipping production frontend build in dev mode"{{else}}pnpm build{{end}}'

  dev:frontend:
    summary: Runs the frontend dev server
    dir: frontend
    deps:
      - task: install:frontend:deps
    cmds:
      - pnpm dev --port {{.VITE_PORT}} --strictPort

  update:build-assets:
    summary: Updates Wails v3 build assets from build/config.yml
    dir: build
    cmds:
      - wails3 update build-assets -name "{{.APP_NAME}}" -binaryname "{{.APP_NAME}}" -config config.yml -dir .
