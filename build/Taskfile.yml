version: '3'

tasks:
  go:mod:tidy:
    summary: Runs `go mod tidy`
    internal: true
    cmds:
      - go mod tidy

  install:frontend:deps:
    summary: Install frontend dependencies
    dir: frontend
    sources:
      - package.json
      - pnpm-lock.yaml
    generates:
      - node_modules
    preconditions:
      - sh: pnpm --version
        msg: "pnpm not found"
    cmds:
      - pnpm install

  build:frontend:
    label: build:frontend (DEV={{.DEV}})
    summary: Build the frontend project
    dir: frontend
    sources:
      - "**/*"
      - exclude: node_modules/**/*
    generates:
      - dist/**/*
    deps:
      - task: install:frontend:deps
      - task: generate:bindings
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
    cmds:
      - pnpm run build
    env:
      PRODUCTION: '{{if eq .DEV "true"}}false{{else}}true{{end}}'

  generate:bindings:
    # Hash the flags: the label names the .task/checksum fingerprint file, and
    # the raw BUILD_FLAGS (release ldflags embed version + cloud secrets) blow
    # past the 255-byte filename limit in CI.
    label: generate:bindings (BUILD_FLAGS_SHA={{.BUILD_FLAGS | default "" | sha256sum | trunc 12}})
    summary: Generates bindings for the frontend
    deps:
      - task: go:mod:tidy
    sources:
      - "**/*.[jt]s"
      - exclude: frontend/**/*
      - frontend/bindings/**/*  # Rerun when switching between dev/production mode causes changes in output
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - frontend/bindings/**/*
    cmds:
      # The binding generator statically analyses the Go code, which requires
      # the embedded frontend/dist directory to exist and be non-empty.
      - mkdir -p frontend/dist
      - '[ -f frontend/dist/index.html ] || echo "<html></html>" > frontend/dist/index.html'
      - wails3 generate bindings -f '{{.BUILD_FLAGS}}' -clean=true -ts

  generate:icons:
    summary: Generates Windows `.ico` from `appicon.png` and Mac `.icns` from `appicon-mac.png`
    dir: build
    sources:
      - "appicon.png"
      - "appicon-mac.png"
    generates:
      - "darwin/icons.icns"
      - "windows/icon.ico"
    cmds:
      # macOS expects a transparent safe-area margin so the icon matches sibling dock
      # icons; appicon-mac.png has that padding, appicon.png is full-bleed for Windows.
      - wails3 generate icons -input appicon-mac.png -macfilename darwin/icons.icns
      - wails3 generate icons -input appicon.png -windowsfilename windows/icon.ico
      # Each invocation also emits the other platform's default file in this dir; drop them.
      - rm -f icon.ico icons.icns

  dev:frontend:
    summary: Runs the frontend in development mode
    dir: frontend
    deps:
      - task: install:frontend:deps
    cmds:
      - pnpm dev --port {{.VITE_PORT}} --strictPort

  update:build-assets:
    summary: Updates the build assets
    dir: build
    cmds:
      - wails3 update build-assets -name "{{.APP_NAME}}" -binaryname "{{.APP_NAME}}" -config config.yml -dir .

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - docker build -t wails-cross -f build/docker/Dockerfile.cross build/docker/
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is required. Please install Docker first."
