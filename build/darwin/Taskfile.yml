version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: Builds the application for macOS
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          DEV:
            ref: .DEV
      - task: common:generate:icons
    cmds:
      - go build {{.BUILD_FLAGS}} -o "{{.OUTPUT}}"
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}-buildvcs=false -gcflags=all="-l" -ldflags="{{.LD_FLAGS}}"{{else}}-tags production -trimpath -buildvcs=false -ldflags="-w -s {{.LD_FLAGS}}"{{end}}'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
    env:
      GOOS: darwin
      CGO_ENABLED: 1
      GOARCH: '{{.ARCH | default ARCH}}'
      CGO_CFLAGS: "-mmacosx-version-min=12.0"
      CGO_LDFLAGS: "-mmacosx-version-min=12.0"
      MACOSX_DEPLOYMENT_TARGET: "12.0"

  build:universal:
    summary: Builds darwin universal binary (arm64 + amd64)
    deps:
      - task: build
        vars:
          ARCH: amd64
          OUTPUT: "{{.BIN_DIR}}/{{.APP_NAME}}-amd64"
          LD_FLAGS:
            ref: .LD_FLAGS
      - task: build
        vars:
          ARCH: arm64
          OUTPUT: "{{.BIN_DIR}}/{{.APP_NAME}}-arm64"
          LD_FLAGS:
            ref: .LD_FLAGS
    cmds:
      - lipo -create -output "{{.BIN_DIR}}/{{.APP_NAME}}" "{{.BIN_DIR}}/{{.APP_NAME}}-amd64" "{{.BIN_DIR}}/{{.APP_NAME}}-arm64"
      - rm "{{.BIN_DIR}}/{{.APP_NAME}}-amd64" "{{.BIN_DIR}}/{{.APP_NAME}}-arm64"

  package:
    summary: Packages the application into a `.app` bundle
    deps:
      - task: build
        vars:
          ARCH: '{{.ARCH}}'
          LD_FLAGS:
            ref: .LD_FLAGS
    cmds:
      - task: create:app:bundle
        vars:
          VERSION: '{{.VERSION}}'

  package:universal:
    summary: Packages darwin universal binary (arm64 + amd64)
    deps:
      - task: build:universal
        vars:
          LD_FLAGS:
            ref: .LD_FLAGS
    cmds:
      - task: create:app:bundle
        vars:
          VERSION: '{{.VERSION}}'

  create:app:bundle:
    summary: Creates an `.app` bundle
    cmds:
      - mkdir -p "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app/Contents/MacOS"
      - mkdir -p "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app/Contents/Resources"
      - cp build/darwin/icons.icns "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app/Contents/Resources"
      - cp "{{.BIN_DIR}}/{{.APP_NAME}}" "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app/Contents/MacOS"
      - cp build/darwin/Info.plist "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app/Contents"
      # Stamp the release version into the bundle when provided (e.g. from CI)
      - '{{if .VERSION}}plutil -replace CFBundleShortVersionString -string "{{trimPrefix "v" .VERSION}}" "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app/Contents/Info.plist"{{else}}true{{end}}'
      - '{{if .VERSION}}plutil -replace CFBundleVersion -string "{{trimPrefix "v" .VERSION}}" "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app/Contents/Info.plist"{{else}}true{{end}}'
      - codesign --force --deep --sign - "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.app"

  run:
    cmds:
      - task: build
        vars:
          DEV: '{{.DEV | default "true"}}'
      - mkdir -p "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.dev.app/Contents/MacOS"
      - mkdir -p "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.dev.app/Contents/Resources"
      - cp build/darwin/icons.icns "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.dev.app/Contents/Resources"
      - cp "{{.BIN_DIR}}/{{.APP_NAME}}" "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.dev.app/Contents/MacOS"
      - cp "build/darwin/Info.dev.plist" "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.dev.app/Contents/Info.plist"
      - codesign --force --deep --sign - "{{.BIN_DIR}}/{{.PRODUCT_NAME}}.dev.app"
      - '"{{.BIN_DIR}}/{{.PRODUCT_NAME}}.dev.app/Contents/MacOS/{{.APP_NAME}}"'
