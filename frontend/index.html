<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script>
      // Apply the stored theme before first paint to avoid a flash of the
      // wrong theme. Kept in sync by src/stores/theme.ts afterwards.
      try {
        if (localStorage.getItem("mqtt-viewer-theme") === "light") {
          document.documentElement.classList.remove("dark");
          document.documentElement.classList.add("light");
        }
      } catch (e) {}
    </script>
    <script>
      // Server mode pushes backend->frontend events over a WebSocket
      // bootstrapped by /wails/custom.js, which the server serves but does not
      // auto-inject; the native webview has no such route. Probe for it and
      // append the script only where it exists, before the main module so the
      // event bridge is up first. See frontend/AGENTS.md "Driving the app from
      // a browser".
      (function () {
        try {
          fetch("/wails/custom.js", { method: "HEAD" })
            .then(function (res) {
              if (!res.ok) return;
              var script = document.createElement("script");
              script.src = "/wails/custom.js";
              document.head.appendChild(script);
            })
            .catch(function () {});
        } catch (e) {}
      })();
    </script>
    <link href="./src/style.css" rel="stylesheet" />
    <title>MQTT Viewer</title>
  </head>
  <body>
    <div id="app"></div>
    <script src="./src/main.ts" type="module"></script>
  </body>
</html>
