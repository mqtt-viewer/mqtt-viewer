<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script>
      // Path-prefix shim for reverse proxies that serve the UI under a subpath
      // (Home Assistant ingress mounts it at /api/hassio_ingress/<token>/). The
      // bundled @wailsio/runtime and the server's custom.js hardcode root-
      // absolute /wails/* URLs: the runtime POSTs to origin + "/wails/runtime",
      // loads "/wails/custom.js", and custom.js opens a WebSocket to
      // "/wails/events". Under a prefix those bypass the proxy and 404, so no
      // binding call or live event ever reaches the backend. I cannot edit the
      // bundled runtime, so I rewrite /wails/* access at the page level before
      // anything else loads: fetch (runtime calls and the custom.js probe),
      // WebSocket (events), and <script src> (the injected custom.js tag) are
      // wrapped to resolve /wails/* relative to the document directory instead
      // of the origin root. Served at the root (desktop webview, or server mode
      // at /) the directory is "/", so the rewrite is a no-op and behaviour is
      // unchanged.
      (function () {
        try {
          var rewrite = function (value) {
            try {
              var resolved = new URL(value, document.baseURI);
              if (
                resolved.host === location.host &&
                resolved.pathname.indexOf("/wails/") === 0
              ) {
                var dir = new URL(".", document.baseURI).pathname;
                // Preserve protocol (ws/wss/http/https), search and hash; only
                // reparent the path under the document directory.
                resolved.pathname = dir + resolved.pathname.slice(1);
                return resolved.href;
              }
            } catch (e) {}
            return value;
          };

          var origFetch = window.fetch;
          if (origFetch) {
            window.fetch = function (input, init) {
              try {
                if (typeof input === "string" || input instanceof URL) {
                  input = rewrite(String(input));
                } else if (input && typeof input.url === "string") {
                  var next = rewrite(input.url);
                  if (next !== input.url) input = new Request(next, input);
                }
              } catch (e) {}
              return origFetch.call(this, input, init);
            };
          }

          if (window.WebSocket) {
            window.WebSocket = new Proxy(window.WebSocket, {
              construct: function (target, args) {
                if (args.length > 0) args[0] = rewrite(String(args[0]));
                return Reflect.construct(target, args);
              },
            });
          }

          var scriptSrc = Object.getOwnPropertyDescriptor(
            HTMLScriptElement.prototype,
            "src"
          );
          if (scriptSrc && scriptSrc.set) {
            Object.defineProperty(HTMLScriptElement.prototype, "src", {
              configurable: true,
              enumerable: scriptSrc.enumerable,
              get: function () {
                return scriptSrc.get.call(this);
              },
              set: function (value) {
                scriptSrc.set.call(this, rewrite(String(value)));
              },
            });
          }
        } catch (e) {}
      })();
    </script>
    <script>
      // Apply the stored theme before first paint to avoid a flash of the
      // wrong theme. Kept in sync by src/stores/theme.ts afterwards.
      try {
        if (localStorage.getItem("mqtt-viewer-theme") === "light") {
          document.documentElement.classList.remove("dark");
          document.documentElement.classList.add("light");
        }
      } catch (e) {}
    </script>
    <script>
      // Server mode pushes backend->frontend events over a WebSocket
      // bootstrapped by /wails/custom.js, which the server serves but does not
      // auto-inject; the native webview has no such route. Probe for it and
      // append the script only where it exists, before the main module so the
      // event bridge is up first. The path is relative so it resolves under a
      // reverse-proxy prefix (the shim above also rewrites it). See
      // frontend/AGENTS.md "Driving the app from a browser".
      (function () {
        try {
          fetch("wails/custom.js", { method: "HEAD" })
            .then(function (res) {
              if (!res.ok) return;
              var script = document.createElement("script");
              script.src = "wails/custom.js";
              document.head.appendChild(script);
            })
            .catch(function () {});
        } catch (e) {}
      })();
    </script>
    <link href="./src/style.css" rel="stylesheet" />
    <title>MQTT Viewer</title>
  </head>
  <body>
    <div id="app"></div>
    <script src="./src/main.ts" type="module"></script>
  </body>
</html>
