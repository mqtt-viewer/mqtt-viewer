name: Release MQTT Viewer - Linux

on:
  release:
    types: [published]

env:
  GO_VERSION: "1.25.x"
  WAILS_VERSION: "v3.0.0-alpha.98"
  NODE_VERSION: "20.15.0"

jobs:
  release:
    strategy:
      matrix:
        build:
          - arch: amd64
            os: blacksmith
            tag: linux_amd64
          - arch: arm64
            os: blacksmith-arm
            tag: linux_arm64
    runs-on: ${{ matrix.build.os }}
    name: Release MQTT Viewer (${{ matrix.build.tag }})
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Set up common, sanitised environment variables

      - name: Normalise version tag
        id: normalise_version
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            version=$(echo ${{ github.event.release.tag_name }})
          else
            version="v0.0.0"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Define output filename
        id: define_filename
        shell: bash
        run: |
          echo "filename=MQTT_Viewer_${{ steps.normalise_version.outputs.version }}_${{ matrix.build.tag }}" >> $GITHUB_OUTPUT

      # Set up development dependencies

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # -tags gtk3: the CLI links the same webview stack as the app; without
      # the tag it requires gtk4 dev headers, which we don't install.
      - name: Install wails3 CLI
        shell: bash
        run: go install -tags gtk3 github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        shell: bash
        run: npm install -g pnpm

      # Dependencies (gtk3 / WebKit2GTK 4.1 stack, matching the -tags gtk3 build)

      - name: Install Ubuntu prerequisites
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libfuse2 zip rpm

      # Build + package (binary, AppImage, deb, rpm)

      - name: Build and package wails app
        shell: bash
        run: |
          LD_FLAGS="-X mqtt-viewer/backend/env.Version=${{ steps.normalise_version.outputs.version }}"
          LD_FLAGS="${LD_FLAGS} -X mqtt-viewer/backend/env.MachineIdProtectString=${{ secrets.MACHINE_ID_SECRET }}"
          LD_FLAGS="${LD_FLAGS} -X mqtt-viewer/backend/env.CloudUsername=${{ secrets.CLOUD_USERNAME }}"
          LD_FLAGS="${LD_FLAGS} -X mqtt-viewer/backend/env.CloudPassword=${{ secrets.CLOUD_PASSWORD }}"
          wails3 task linux:package ARCH=${{ matrix.build.arch }} VERSION=${{ steps.normalise_version.outputs.version }} LD_FLAGS="${LD_FLAGS}"

      # Collect + rename artifacts

      - name: Collect release artifacts
        shell: bash
        run: |
          set -x
          filename=${{ steps.define_filename.outputs.filename }}
          mkdir -p dist
          # plain binary zip (consumed by the in-app updater)
          (cd bin && zip -r ../dist/${filename}.zip mqtt-viewer)
          # AppImage
          mv bin/*.AppImage dist/${filename}.AppImage
          # deb / rpm
          mv bin/*.deb dist/${filename}.deb
          mv bin/*.rpm dist/${filename}.rpm
          # checksums
          cd dist && for f in ${filename}.zip ${filename}.AppImage ${filename}.deb ${filename}.rpm; do
            sha256sum "$f" > "$f.sha256"
          done

      # Publish

      - name: Upload release assets
        uses: alexellis/upload-assets@0.4.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          asset_paths: '["dist/*"]'
