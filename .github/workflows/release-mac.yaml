name: Release MQTT Viewer - Mac

on:
  release:
    types: [published]

env:
  GO_VERSION: "1.25.x"
  WAILS_VERSION: "v3.0.0-alpha.98"
  NODE_VERSION: "22.17.0"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        build:
          - arch: amd64
            os: macos-latest
            tag: darwin_amd64
          - arch: arm64
            os: macos-latest
            tag: darwin_arm64
    runs-on: ${{ matrix.build.os }}
    name: Release MQTT Viewer (${{ matrix.build.tag }})
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Set up common, sanitised environment variables

      - name: Normalise version tag
        id: normalise_version
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            version=$(echo ${{ github.event.release.tag_name }})
          else
            version="v0.0.0"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Define output filename
        id: define_filename
        shell: bash
        run: |
          echo "filename=MQTT_Viewer_${{ steps.normalise_version.outputs.version }}_${{ matrix.build.tag }}" >> $GITHUB_OUTPUT

      # Set up development dependencies

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install wails3 CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        shell: bash
        run: npm install -g pnpm@10.28.0

      # Dependencies

      - name: Setup Gon
        run: brew install Bearer/tap/gon

      - name: Import code signing certificate from Github Secrets
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}

      - name: Use mac app icon
        shell: bash
        run: |
          cd build
          rm -f appicon.png
          mv appicon-mac.png appicon.png

      # Build

      - name: Build and package macOS app
        shell: bash
        run: |
          echo "building app for darwin/${{ matrix.build.arch }}"
          LD_FLAGS="-X mqtt-viewer/backend/env.Version=${{ steps.normalise_version.outputs.version }}"
          LD_FLAGS="${LD_FLAGS} -X mqtt-viewer/backend/env.MachineIdProtectString=${{ secrets.MACHINE_ID_SECRET }}"
          LD_FLAGS="${LD_FLAGS} -X mqtt-viewer/backend/env.CloudUsername=${{ secrets.CLOUD_USERNAME }}"
          LD_FLAGS="${LD_FLAGS} -X mqtt-viewer/backend/env.CloudPassword=${{ secrets.CLOUD_PASSWORD }}"
          wails3 task darwin:package ARCH=${{ matrix.build.arch }} VERSION=${{ steps.normalise_version.outputs.version }} LD_FLAGS="${LD_FLAGS}"

      - name: Sign, zip, notarize macOS app
        shell: bash
        run: |
          echo "Removing ad-hoc signature"
          codesign --remove-signature "./bin/MQTT Viewer.app"
          echo "Signing Package"
          gon -log-level=info ./build/darwin/gon.sign.json
          echo "Zipping Package"
          # --norsrc/--noextattr/--noqtn: keep AppleDouble (._*) entries out of
          # the zip. The in-app updater extracts this zip verbatim; stray ._
          # files break the bundle's code signature seal and Gatekeeper then
          # silently refuses to launch the updated app.
          ditto -c -k --norsrc --noextattr --noqtn --keepParent "./bin/MQTT Viewer.app" ./bin/MQTTViewer.zip
          echo "Cleaning up"
          rm -rf "./bin/MQTT Viewer.app"
          echo "Notarizing Zip Files"
          gon -log-level=info ./build/darwin/gon.notarize.json
        env:
          AC_USERNAME: ${{ secrets.AC_USERNAME }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
          AC_PROVIDER: ${{ secrets.AC_PROVIDER }}

      # Publish

      - name: Rename release zip and create checksum
        shell: bash
        run: |
          mv bin/MQTTViewer.zip bin/${{ steps.define_filename.outputs.filename }}.zip
          cd bin && shasum -a 256 ${{ steps.define_filename.outputs.filename }}.zip > ${{ steps.define_filename.outputs.filename }}.zip.sha256

      - name: Upload release assets
        uses: alexellis/upload-assets@0.4.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          asset_paths: '["bin/${{ steps.define_filename.outputs.filename }}.zip", "bin/${{ steps.define_filename.outputs.filename }}.zip.sha256"]'

      # Register the updater artifact with the portal. The record is created
      # with released=false; toggle `released` in the portal admin UI to make
      # it visible to in-app update checks.

      - name: Register release with portal
        shell: bash
        env:
          PORTAL_URL: https://cloud.mqttviewer.app
          CI_RELEASES_USERNAME: ${{ secrets.CI_RELEASES_USERNAME }}
          CI_RELEASES_PASSWORD: ${{ secrets.CI_RELEASES_PASSWORD }}
          RELEASE_NOTES: ${{ github.event.release.body }}
          PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: |
          asset=bin/${{ steps.define_filename.outputs.filename }}.zip
          name=$(basename "$asset")
          size=$(wc -c < "$asset" | tr -d ' ')
          sha256=$(cut -d' ' -f1 < "$asset.sha256")
          url="https://github.com/${{ github.repository }}/releases/download/${{ steps.normalise_version.outputs.version }}/$name"
          jq -n \
            --arg version "${{ steps.normalise_version.outputs.version }}" \
            --arg notes "$RELEASE_NOTES" \
            --arg published_at "$PUBLISHED_AT" \
            --arg key "darwin_${{ matrix.build.arch }}" \
            --arg name "$name" --arg url "$url" --arg sha256 "$sha256" --argjson size "$size" \
            '{version: $version, release_notes: $notes, published_at: $published_at,
              artifacts: {($key): {name: $name, url: $url, size: $size, sha256: $sha256}}}' \
            | curl --fail-with-body -u "$CI_RELEASES_USERNAME:$CI_RELEASES_PASSWORD" \
                -H 'Content-Type: application/json' -d @- \
                "$PORTAL_URL/api/cv1/updates/v3/releases"
