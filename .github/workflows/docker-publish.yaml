name: Publish Docker image

# Builds and pushes the MQTT Viewer web/server image (see Dockerfile,
# docs/DOCKER.md) to GHCR for linux/amd64 and linux/arm64.
#
# The Go build stage cross-compiles natively via BUILDPLATFORM (Go's own
# cross-compiler, no CGO), so QEMU is only needed for the alpine-based
# runtime stage's RUN steps (apk add, adduser, ...) when targeting arm64 on
# this amd64 runner.
#
# Runs on every published release, and can be triggered manually
# (workflow_dispatch) to push an image from the current branch state for
# testing.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to stamp (e.g. v1.2.3)"
        required: false
        default: "v0.0.0-test"

concurrency:
  group: docker-publish
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mqtt-viewer

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          v="${{ github.event.release.tag_name }}"
          [ -z "$v" ] && v="${{ github.event.inputs.version }}"
          [ -z "$v" ] && v="v0.0.0-test"
          # Strip a leading "v" for the build-arg (env.Version must not
          # contain "-dev"; a bare "v0.0.0-test" would be fine either way,
          # but the stripped form is what's shown in the app).
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "build_version=${v#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.ver.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.ver.outputs.version }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.build_version }}
          secrets: |
            machine_id_secret=${{ secrets.MACHINE_ID_SECRET }}
            cloud_username=${{ secrets.CLOUD_USERNAME }}
            cloud_password=${{ secrets.CLOUD_PASSWORD }}
