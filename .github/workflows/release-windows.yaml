name: Release MQTT Viewer - Windows

on:
  release:
    types: [published]

env:
  GO_VERSION: "1.25.x"
  WAILS_VERSION: "v3.0.0-alpha.98"
  NODE_VERSION: "20.15.0"

jobs:
  release:
    strategy:
      matrix:
        build:
          - arch: amd64
            os: windows-latest
            tag: windows_amd64
    runs-on: ${{ matrix.build.os }}
    name: Release MQTT Viewer (${{ matrix.build.tag }})
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Set up common, sanitised environment variables

      - name: Normalise version tag
        id: normalise_version
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            version=$(echo ${{ github.event.release.tag_name }})
          else
            version="v0.0.0"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Define output filename
        id: define_filename
        shell: bash
        run: |
          echo "filename=MQTT_Viewer_${{ steps.normalise_version.outputs.version }}_${{ matrix.build.tag }}" >> $GITHUB_OUTPUT

      # Set up development dependencies

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install wails3 CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        shell: bash
        run: npm install -g pnpm

      # Dependencies

      - name: Install Windows dependencies
        uses: crazy-max/ghaction-chocolatey@v3
        with:
          args: install nsis

      # Build exe + NSIS installer

      - name: Build and package Windows app
        shell: bash
        run: |
          LD_FLAGS="-X mqtt-viewer/backend/env.Version=${{ steps.normalise_version.outputs.version }}"
          LD_FLAGS="${LD_FLAGS} -X mqtt-viewer/backend/env.MachineIdProtectString=${{ secrets.MACHINE_ID_SECRET }}"
          LD_FLAGS="${LD_FLAGS} -X mqtt-viewer/backend/env.CloudUsername=${{ secrets.CLOUD_USERNAME }}"
          LD_FLAGS="${LD_FLAGS} -X mqtt-viewer/backend/env.CloudPassword=${{ secrets.CLOUD_PASSWORD }}"
          wails3 task windows:package ARCH=${{ matrix.build.arch }} VERSION=${{ steps.normalise_version.outputs.version }} LD_FLAGS="${LD_FLAGS}"

      - name: Azure Trusted Signing
        uses: azure/trusted-signing-action@v0.3.16
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          code-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}

          # Sign all exes inside the folder (portable exe + NSIS installer)
          files-folder: "./bin"
          files-folder-filter: exe
          file-digest: SHA256

      # Publish

      - name: Collect release artifacts
        shell: powershell
        run: |
          $filename = "${{ steps.define_filename.outputs.filename }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # portable zip (consumed by the in-app updater)
          Compress-Archive -Path "bin/mqtt-viewer.exe" -DestinationPath "dist/$filename.zip"
          # NSIS installer
          Move-Item "bin/mqtt-viewer-${{ matrix.build.arch }}-installer.exe" "dist/${filename}_installer.exe"
          # checksums
          cd dist
          foreach ($f in @("$filename.zip", "${filename}_installer.exe")) {
            $hash = (Get-FileHash -Algorithm SHA256 $f).Hash.ToLower()
            "$hash  $f" | Out-File -Encoding ascii "$f.sha256"
          }

      - name: Upload release assets
        uses: alexellis/upload-assets@0.4.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          asset_paths: '["dist/*"]'
